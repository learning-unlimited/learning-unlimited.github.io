<script src="https://unpkg.com/lucide@latest"></script>

<style>
  :root {
    --apple-gray: #f5f5f7;
    --apple-blue: #0066cc;
    --text-main: #1d1d1f;
    --text-secondary: #86868b;
  }

  .apple-viewport {
    max-width: 900px;
    margin: 1.5rem auto;
    padding: 1.5rem;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    color: var(--text-main);
    -webkit-font-smoothing: antialiased;
  }

  .contact-wrapper {
    display: flex;
    align-items: flex-start;
    gap: 3rem;
  }

  .hero-side {
    flex: 0.8;
  }

  .hero-side h1 {
    font-size: 40px;
    line-height: 1.1;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .hero-side p {
    font-size: 17px;
    color: var(--text-secondary);
    line-height: 1.4;
  }

  .content-side {
    flex: 1.2;
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .compact-card {
    background: #fbfbfd;
    border-radius: 14px;
    padding: 16px 20px;
    border: 1px solid rgba(0,0,0,0.03);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
  }

  .compact-card:hover {
    background: #ffffff;
    box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    transform: scale(1.01);
  }

  .icon-box {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-info { display: flex; flex-direction: column; }
  .label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em; }
  .value { font-size: 15px; font-weight: 500; color: var(--text-main); }

  .social-row { display: flex; gap: 8px; margin-top: 8px; width: 100%; }
  .mini-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: filter 0.2s;
  }

  /* Entrance Animation */
  .reveal {
    animation: reveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    .contact-wrapper { flex-direction: column; gap: 1.5rem; }
    .hero-side { text-align: center; width: 100%; }
  }
</style>
